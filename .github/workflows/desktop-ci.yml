name: Desktop CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "desktop/**"
      - "scripts/generate_icons.py"
      - ".github/workflows/desktop-ci.yml"
      - "!**/*.md"
      - "!docs/**"
      - "!wiki/**"
  push:
    branches: [dev, main]
    paths:
      - "desktop/**"
      - "scripts/generate_icons.py"
      - ".github/workflows/desktop-ci.yml"
      - "!**/*.md"
      - "!docs/**"
      - "!wiki/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: desktop/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: desktop
        run: npm install

      - name: Generate icons
        run: pip install Pillow && python scripts/generate_icons.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update icons [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: desktop/src-tauri/icons/*

      - name: Build Tauri
        working-directory: desktop
        id: build
        run: |
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV
          npm run tauri build
          echo "BUILD_END=$(date +%s)" >> $GITHUB_ENV

      - name: Build metrics
        run: |
          echo "## Build Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Tauri build | $(( $BUILD_END - $BUILD_START ))s |" >> $GITHUB_STEP_SUMMARY

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: kaos-desktop-linux
          path: desktop/src-tauri/target/release/bundle/**
