name: Daily Graphify Update

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC todo dia
  workflow_dispatch:  # trigger manual

permissions:
  contents: write  # para commitar graphify-out/graph.json

jobs:
  update-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install Graphify
        run: uv pip install graphifyy

      - name: Update Graphify Graph
        run: graphify update .
        working-directory: ${{ github.workspace }}

      - name: Enrich Graph (structural quality, no LLM)
        id: enrich
        continue-on-error: true
        run: |
          if graphify enrich --skip-llm --skip-community 2>/dev/null; then
            echo "enriched=true" >> $GITHUB_OUTPUT
          else
            echo "enriched=false" >> $GITHUB_OUTPUT
            echo "[warning] graphify enrich not available (needs graphifyy>=0.9.13)"
          fi

      - name: Generate Dashboard
        if: steps.enrich.outputs.enriched == 'true'
        run: |
          python -c "
          import sys, json
          try:
            from graphify.enriched.dashboard import generate_dashboard
            generate_dashboard('graphify-out/enriched/graph.enriched.json', 'graphify-out/enriched/dashboard.html')
            print('[dashboard] Generated')
          except ImportError:
            print('[dashboard] Dashboard module not available')
          "

      - name: Verify graph.json changed
        id: check
        run: |
          if git diff --quiet graphify-out/graph.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit graph.json
        if: steps.check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update graphify graph [skip ci]"
          file_pattern: |
            graphify-out/graph.json
            graphify-out/enriched/
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Summary
        run: |
          echo "## Graphify Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Graph updated: ${{ steps.check.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Enriched: ${{ steps.enrich.outputs.enriched }}" >> $GITHUB_STEP_SUMMARY
          echo "- Files: graphify-out/graph.json, graphify-out/enriched/" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY