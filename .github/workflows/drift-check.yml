name: Drift Check

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "docs/**"

env:
  PYTHON_VERSION: "3.13"

jobs:
  drift-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Run drift check
        run: |
          uv run python -c "
          import sys
          sys.path.insert(0, '.')
          from app.audit.audit_engine import AuditEngine

          report = AuditEngine.run_audit()
          drift = 100 - report.coverage
          print(f'Coverage: {report.coverage:.1f}%')
          print(f'Drift Score: {drift:.1f}%')
          print(f'Missing Features: {len(report.missing_features)}')
          print(f'Outdated Docs: {len(report.outdated_docs)}')
          print(f'Orphaned SDDs: {len(report.orphaned_sdds)}')

          MAX_DRIFT = 45.0
          if drift > MAX_DRIFT:
              print(f'::error::Drift score {drift:.1f}% above limit of {MAX_DRIFT}%. Update documentation before merging.')
              sys.exit(1)

          print('Drift check passed.')
          "
        env:
          OBSIDIAN_VAULT_PATH: ${{ github.workspace }}/docs
