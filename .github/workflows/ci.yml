name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "desktop/**"
      - "infra/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "desktop/**"
      - "infra/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Validacao do Backend (Assistant) ──────────────────────────────────
  validate-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: assistant
        run: uv sync --only-dev

      - name: Ruff lint
        working-directory: assistant
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: assistant
        run: uv run ruff format --check .

      - name: Run tests
        working-directory: assistant
        run: uv run pytest tests/ -v --asyncio-mode=auto
        env:
          OLLAMA_HOST: http://localhost:11434

  # ── Job 2: Enriquecimento do Knowledge Graph ──────────────────────────────────
  enrich-graph:
    runs-on: ubuntu-latest
    needs: validate-backend
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.13"
          enable-cache: true

      - name: Install Graphify
        run: uv pip install --system graphifyy

      - name: Enrich Graph (structural quality, no LLM)
        continue-on-error: true
        run: |
          if graphify enrich --skip-llm --skip-community 2>/dev/null; then
            echo "enriched=true" >> $GITHUB_OUTPUT
          else
            echo "enriched=false" >> $GITHUB_OUTPUT
          fi
        id: enrich

      - name: Generate Dashboard
        if: steps.enrich.outputs.enriched == 'true'
        run: |
          python -c "
          import json
          from pathlib import Path
          ep = Path('graphify-out/enriched/graph.enriched.json')
          if ep.exists():
              print(f'Enriched graph OK: {ep.stat().st_size} bytes')
          else:
              print('No enriched graph found')
          "

      - name: Commit enriched graph
        if: steps.enrich.outputs.enriched == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-enrich knowledge graph [skip ci]"
          file_pattern: graphify-out/enriched/
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  # ── Job 3: Validacao do Desktop Client (Tauri/Vite) ──────────────────────────
  validate-desktop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Cache Vite
        uses: actions/cache@v4
        with:
          path: desktop/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: desktop
        run: npm install

      - name: Verify version consistency
        run: node scripts/check-version-consistency.js

      - name: TypeScript type check
        working-directory: desktop
        run: npx tsc --noEmit

      - name: Run unit & integration tests
        working-directory: desktop
        run: npx vitest run --coverage --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: desktop/coverage/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Generate icons
        run: |
          pip install --break-system-packages Pillow
          python scripts/generate_icons.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update icons [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          file_pattern: desktop/src-tauri/icons/*

      - name: Build Tauri
        working-directory: desktop
        env:
          CARGO_HTTP_RETRY: 3
          CARGO_HTTP_TIMEOUT: 120
        run: npm run tauri build

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: kaos-desktop-linux
          path: desktop/src-tauri/target/release/bundle/**

  # ── Job 3: Compilacao e Envio do Docker Otimizado (GHCR) ───────────────────
  docker-build:
    needs: [validate-backend, validate-desktop]
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kaos
          POSTGRES_PASSWORD: kaos
          POSTGRES_DB: kaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: assistant
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Healthcheck
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:sha-${GITHUB_SHA::7}"
          docker rm -f kaos-test 2>/dev/null || true
          docker run -d --name kaos-test --network=host \
            -e DATABASE_URL=postgresql+asyncpg://kaos:kaos@localhost:5432/kaos \
            -e QDRANT_HOST=localhost \
            -e QDRANT_PORT=6333 \
            "$IMAGE"
          for i in $(seq 1 24); do
            sleep 5
            if ! docker ps -q -f name=kaos-test | grep -q .; then
              echo "=== Container crashed ==="
              docker logs kaos-test 2>&1 || true
              exit 1
            fi
            curl -sf http://localhost:8000/health && break
          done
          curl -sf http://localhost:8000/health | grep -q '"status":"ok"' || {
            echo "=== Container logs ==="
            docker logs kaos-test 2>&1 || true
            exit 1
          }
          docker rm -f kaos-test >/dev/null
          echo "Healthcheck passed"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}@${{ steps.build.outputs.digest }}"

  # ── Job 7: Auto-Documentação Contínua ─────────────────────────────────────────
  auto-docs:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - name: Sync vault (docs/wiki → workspace/kaos/vault/wiki)
        shell: pwsh
        run: ./scripts/sync-vault.ps1

      - name: Check for vault divergence
        shell: pwsh
        run: ./scripts/check-duplicates.ps1

      - name: Scan docs gaps
        run: uv run python scripts/scan_docs_gaps.py
        working-directory: assistant

      - name: Commit auto-doc changes
        shell: pwsh
        run: |
          git config user.name "kaos-bot"
          git config user.email "bot@kaos.local"
          git add docs/ workspace/kaos/vault/wiki/
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit"
          } else {
            git commit -m "chore(docs): auto-sync vault and documentation [skip ci]"
            git push
          }
