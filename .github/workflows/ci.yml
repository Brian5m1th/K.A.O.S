name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "infra/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "infra/**"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: assistant

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --only-dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format .

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format with ruff [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --asyncio-mode=auto
        env:
          OLLAMA_HOST: http://localhost:11434

  docker:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=nightly

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: assistant
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Healthcheck
        run: |
          IMAGE="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          docker run --rm -d --name kaos-test -p 8000:8000 "$IMAGE"
          for i in $(seq 1 24); do
            sleep 5
            curl -sf http://localhost:8000/health && break
          done
          curl -sf http://localhost:8000/health | grep -q '"status":"ok"' || {
            echo "=== Container logs ==="
            docker logs kaos-test 2>&1 || true
            exit 1
          }
          echo "Healthcheck passed"
