name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "infra/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "assistant/**"
      - "infra/**"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: assistant

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --only-dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --asyncio-mode=auto
        env:
          OLLAMA_HOST: http://localhost:11434

  docker:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: kaos
          POSTGRES_PASSWORD: kaos
          POSTGRES_DB: kaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lowercase repo name
        run: |
          echo "IMAGE_NAME_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=nightly

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: assistant
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Healthcheck
        run: |
          IMAGE="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          docker rm -f kaos-test 2>/dev/null || true
          docker run -d --name kaos-test --network=host \
            -e DATABASE_URL=postgresql+asyncpg://kaos:kaos@localhost:5432/kaos \
            -e QDRANT_HOST=localhost \
            -e QDRANT_PORT=6333 \
            "$IMAGE"
          for i in $(seq 1 24); do
            sleep 5
            if ! docker ps -q -f name=kaos-test | grep -q .; then
              echo "=== Container crashed ==="
              docker logs kaos-test 2>&1 || true
              exit 1
            fi
            curl -sf http://localhost:8000/health && break
          done
          curl -sf http://localhost:8000/health | grep -q '"status":"ok"' || {
            echo "=== Container logs ==="
            docker logs kaos-test 2>&1 || true
            exit 1
          }
          docker rm -f kaos-test >/dev/null
          echo "Healthcheck passed"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}@${{ steps.build.outputs.digest }}"
