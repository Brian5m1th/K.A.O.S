name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v2.1.1)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    # G-06: secrets explicitos para assinar o binario
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: npm install
        run: cd desktop && npm ci

      - name: Build Tauri
        run: cd desktop && npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kaos-launcher-${{ matrix.platform }}
          path: desktop/src-tauri/target/release/bundle/**
          if-no-files-found: warn

  publish:
    name: Publish Release
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kaos-launcher-*
          merge-multiple: true
          path: artifacts

      - name: Generate update-proxy.json (NF-06)
        run: |
          VERSION=$(node -p "require('./desktop/package.json').version")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python3 scripts/gen_update_proxy.py \
            --version "$VERSION" \
            --date "$PUB_DATE" \
            --tag "${{ github.ref_name }}" \
            --artifacts-dir artifacts \
            > update-proxy.json

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.sig
            update-proxy.json
          fail_on_unmatched_files: false
