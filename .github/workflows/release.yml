name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: assistant
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Healthcheck
        run: |
          IMAGE="${{ fromJSON(steps.meta.outputs.json).tags[0] }}"
          docker rm -f kaos-test 2>/dev/null || true
          docker run -d --name kaos-test -p 8000:8000 "$IMAGE"
          for i in $(seq 1 24); do
            sleep 5
            if ! docker ps -q -f name=kaos-test | grep -q .; then
              echo "=== Container crashed ==="
              docker logs kaos-test 2>&1 || true
              exit 1
            fi
            curl -sf http://localhost:8000/health && break
          done
          curl -sf http://localhost:8000/health | grep -q '"status":"ok"' || {
            echo "=== Container logs ==="
            docker logs kaos-test 2>&1 || true
            exit 1
          }
          docker rm -f kaos-test >/dev/null
          echo "Healthcheck passed"

  launcher:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Rust (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: desktop
        run: npm install

      - name: Generate icons
        run: pip install Pillow && python scripts/generate_icons.py

      - name: Build Tauri
        working-directory: desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        run: npm run tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaos-launcher-${{ matrix.os }}
          path: desktop/src-tauri/target/release/bundle/**
          if-no-files-found: warn

  release:
    runs-on: ubuntu-latest
    needs: [docker, launcher]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "# KAOS Platform ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "See the [changelog](../../compare/${{ github.ref_name }}) for details." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: kaos-launcher-*
          merge-multiple: false

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          body: ${{ steps.notes.outputs.RELEASE_NOTES }}
          fail_on_unmatched_files: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
