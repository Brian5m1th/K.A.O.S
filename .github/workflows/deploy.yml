name: Deploy (CD)

on:
  push:
    branches: [main]
    paths:
      - "assistant/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: self-hosted
    steps:
      - name: Clean Workspace Permissions
        run: |
          echo "Stopping existing containers to release volume mounts..."
          CONTAINERS=$(docker ps -a --filter "name=kaos-platform-" -q)
          if [ -n "$CONTAINERS" ]; then
            docker rm -f $CONTAINERS || true
          fi
          docker rm -f evolution_api_prod 2>/dev/null || true

          echo "Cleaning up permissions of files created by root in containers..."
          docker run --rm -v "$(pwd)":/workspace -w /workspace alpine chown -R $(id -u):$(id -g) . || true

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.PAT }}

      - name: Prepare Environment File
        working-directory: infra/docker
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          if [ -n "$ENV_PROD" ]; then
            printf '%s\n' "$ENV_PROD" > .env.prod
            echo "::notice::.env.prod gerado a partir do secret ENV_PROD."
          elif [ -f "/opt/kaos/infra/docker/.env.prod" ]; then
            cp /opt/kaos/infra/docker/.env.prod .env.prod
          elif [ -f "$HOME/kaos/infra/docker/.env.prod" ]; then
            cp "$HOME/kaos/infra/docker/.env.prod" .env.prod
          elif [ -f "$HOME/.env.prod" ]; then
            cp "$HOME/.env.prod" .env.prod
          else
            echo "::error::Arquivo .env.prod de produção não encontrado (nem o secret ENV_PROD foi definido)! Por favor, crie o secret ENV_PROD no repo ou o arquivo em /opt/kaos/infra/docker/.env.prod ou ~/kaos/infra/docker/.env.prod no servidor."
            exit 1
          fi
          if [ ! -s .env.prod ]; then
            echo "::error::.env.prod vazio! Verifique o conteudo do secret ENV_PROD ou do arquivo no host."
            exit 1
          fi

      # Executado apos o .env.prod estar garantido. Falhas de auth/rede sao
      # toleradas (continue-on-error) para nao abortar o job antes do prepare e
      # para permitir uso de imagens em cache quando ghcr estiver indisponivel.
      - name: Log in to GHCR
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy Stack
        working-directory: infra/docker
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Deploying K.A.O.S stack for SHA sha-$SHORT_SHA..."
          
          # Habilitar tag dinamicamente se o Compose suportar interpolação
          export API_IMAGE_TAG="sha-$SHORT_SHA"
          export COMMIT_SHA="$SHORT_SHA"
          export BRANCH_NAME="${{ github.ref_name }}"
          export BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          docker compose -f docker-compose.prod.yml --env-file .env.prod pull || echo "::warning::pull falhou (possivelmente rede/ghcr indisponivel); usando imagens em cache se disponiveis."
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
          docker image prune -f

      - name: Healthcheck Verification
        run: |
          echo "Verifying health of production services..."
          for i in $(seq 1 18); do
            sleep 10
            # Testa o endpoint de saude exposto publicamente ou na porta local
            if curl -sf http://localhost:1010/health | grep -q '"status":"ok"'; then
              echo "=== K.A.O.S API is healthy and running ==="
              exit 0
            fi
            echo "Aguardando inicializacao ($i/18)..."
          done
          echo "::error::API falhou no healthcheck!"
          exit 1

      - name: Automatic Rollback
        if: failure()
        working-directory: infra/docker
        run: |
          echo "=== ALERTA: Deploy falhou. Iniciando Rollback automático para a tag 'latest' estável... ==="
          export API_IMAGE_TAG="latest"
          export COMMIT_SHA="latest"
          export BRANCH_NAME="main"
          export BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          docker compose -f docker-compose.prod.yml --env-file .env.prod pull || echo "::warning::rollback pull falhou; usando imagens em cache."
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
          echo "=== Rollback finalizado para a tag 'latest' ==="
