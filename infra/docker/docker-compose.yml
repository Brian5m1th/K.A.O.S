name: kaos-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai-p
      POSTGRES_PASSWORD: ai-admin
      POSTGRES_DB: kaos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-p -d kaos"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - "3000:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://ai-p:ai-admin@postgres:5432/kaos
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=kaos-local
      - WEBUI_NAME=K.A.O.S
      - DEFAULT_MODELS=kaos,kaos-rag,kaos-fast
      - ENABLE_OAUTH=false
      - WEBUI_AUTH=false
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - kaos-api

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: unless-stopped

  kaos-api:
    build:
      context: ../../assistant
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      # Para usar um vault existente, descomente e ajuste o caminho:
      # - C:\caminho\do\seu\vault:/vault
      - vault_data:/vault
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - qdrant
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  open_webui_data:
  n8n_data:
  vault_data:
