name: kaos-platform
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai-p
      POSTGRES_PASSWORD: ai-admin
      POSTGRES_DB: kaos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-p -d kaos"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000
      - OPENAI_API_KEY=kaos-local
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEFAULT_MODEL=qwen3:4b
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

volumes:
  postgres_data:
  qdrant_data:
  open_webui_data:
