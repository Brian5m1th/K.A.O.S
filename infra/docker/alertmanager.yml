global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'

receivers:
  - name: 'default-receiver'
    # O usuário poderá preencher com seu webhook real para alertas automatizados.
    # Exemplo para Discord:
    # discord_configs:
    #   - webhook_url: 'SUA_WEBHOOK_URL_DO_DISCORD'
