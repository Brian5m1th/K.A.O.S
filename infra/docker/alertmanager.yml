global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://n8n:5678/webhook/kaos-alerts'
        send_resolved: true
        http_config:
          headers:
            X-KAOS-Source: alertmanager

    # Discord integration — uncomment and set your webhook URL:
    # discord_configs:
    #   - webhook_url: 'https://discord.com/api/webhooks/your_webhook_id/your_webhook_token'
    #     title: '{{ .GroupLabels.alertname }}'
    #     message: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
