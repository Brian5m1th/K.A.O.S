name: kaos-platform

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  kaos_prod_network:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    environment:
      POSTGRES_USER: ai-p
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai-admin}
      POSTGRES_DB: kaos
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai-p -d kaos"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "3000:8080"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://ai-p:ai-admin@postgres:5432/kaos
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=kaos-dev-key
      - WEBUI_NAME=K.A.O.S
      - DEFAULT_MODELS=kaos,kaos-rag,kaos-fast
      - ENABLE_OAUTH=false
      - WEBUI_AUTH=false
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      kaos-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://n8n:5678
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 3

  kaos-api:
    build:
      context: ../../assistant
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "1010:8000"
    env_file:
      - .env.prod
    environment:
      - APP_ENV=production
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      # ── Workspace / Dados ──────────────────────────────────────────
      - ../../workspace:/workspace
      - ../../docs:/vault
      - ./logs:/var/log/kaos-api
      - hf_cache:/root/.cache/huggingface
      # ── Configuracao ───────────────────────────────────────────────
      - ../../config:/app/config
      - ../../.opencode:/app/.opencode
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

  prometheus:
    image: prom/prometheus:v2.54.0
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml
      - ./logs:/var/log/kaos-api
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../grafana/provisioning.yml:/etc/grafana/provisioning/dashboards/kaos.yaml
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  evolution-api:
    container_name: evolution_api_prod
    image: evoapicloud/evolution-api:v2.1.1
    restart: always
    logging: *default-logging
    networks:
      - kaos_prod_network
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    volumes:
      - evolution_instances_prod:/evolution/instances
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    networks:
      - kaos_prod_network
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      kaos-api:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  open_webui_data:
  n8n_data:
  prometheus_data:
  loki_data:
  grafana_data:
  hf_cache:
  ollama_data:
  evolution_instances_prod:
